name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip 'v' prefix for version string
          VER="${VERSION#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY="skillhub-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-s -w -X main.Version=${VER}" -o "${BINARY}" .
          echo "BINARY=${BINARY}" >> $GITHUB_ENV
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: |
            ${{ env.BINARY }}
            ${{ env.BINARY }}.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### 安装

            ```bash
            # Linux amd64
            curl -L -o skillhub https://github.com/hitzhangjie/skillhub/releases/download/${{ github.ref_name }}/skillhub-linux-amd64
            chmod +x skillhub && sudo mv skillhub /usr/local/bin/

            # macOS amd64 (Intel)
            curl -L -o skillhub https://github.com/hitzhangjie/skillhub/releases/download/${{ github.ref_name }}/skillhub-darwin-amd64
            chmod +x skillhub && sudo mv skillhub /usr/local/bin/

            # macOS arm64 (Apple Silicon)
            curl -L -o skillhub https://github.com/hitzhangjie/skillhub/releases/download/${{ github.ref_name }}/skillhub-darwin-arm64
            chmod +x skillhub && sudo mv skillhub /usr/local/bin/
            ```

            ### 校验

            每个二进制文件均附有 SHA256 校验和文件（`.sha256`），下载后可通过以下方式校验：

            ```bash
            sha256sum -c skillhub-linux-amd64.sha256
            ```
          files: artifacts/*
          generate_release_notes: true
